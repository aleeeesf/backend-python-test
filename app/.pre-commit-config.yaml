repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        files: ^app/
        entry: app/.venv/bin/ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-check
        name: ruff check
        files: ^app/
        entry: app/.venv/bin/ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: mypy
        name: mypy
        files: ^app/
        entry: bash -c 'cd app && MYPYPATH=. .venv/bin/mypy .' --
        language: system
        types: [python]
        pass_filenames: false
